# ONLYOFFICE DocSpace - Coolify Service Deployment
# Domain: docspace.fahlenbock-cloud.net
# Traefik handles SSL/TLS directly to docspace-router:8092

x-app-env: &x-app-env
  MYSQL_CONTAINER_NAME: docspace-mysql-server
  MYSQL_HOST: docspace-mysql-server
  MYSQL_PORT: "3306"
  MYSQL_ROOT_PASSWORD: 8x2oPXm8KtnKH1He7UUQFogU
  MYSQL_DATABASE: docspace
  MYSQL_USER: onlyoffice_user
  MYSQL_PASSWORD: rYQtWAhJavWk3Ju2IGudpq1J
  DATABASE_MIGRATION: "false"
  APP_DOTNET_ENV: ""
  APP_KNOWN_NETWORKS: "0.0.0.0/0"
  APP_KNOWN_PROXIES: "0.0.0.0/0"
  APP_CORE_SERVER_ROOT: ""
  APP_CORE_BASE_DOMAIN: localhost
  APP_CORE_MACHINEKEY: LWn4umwBkJl20wdnVx8BFSUhsMkA8nMOIkE2ndtZ
  APP_URL_PORTAL: "http://docspace-router:8092"
  INSTALLATION_TYPE: COMMUNITY
  OAUTH_REDIRECT_URL: ""
  DOCUMENT_SERVER_JWT_SECRET: SKSWdY2ZrtAMLP7zmjmlBaG6Jzk4gwtmPqPmVwwH
  DOCUMENT_SERVER_JWT_HEADER: AuthorizationJwt
  DOCUMENT_SERVER_URL_PUBLIC: /ds-vpath/
  DOCUMENT_CONTAINER_NAME: docspace-document-server
  DOCUMENT_SERVER_URL_EXTERNAL: ""
  ELK_CONTAINER_NAME: ""
  ELK_SCHEME: http
  ELK_HOST: ""
  ELK_PORT: "9200"
  REDIS_CONTAINER_NAME: docspace-redis
  REDIS_HOST: docspace-redis
  REDIS_PORT: "6379"
  REDIS_USER_NAME: ""
  REDIS_PASSWORD: ""
  REDIS_DB: "0"
  RABBIT_CONTAINER_NAME: docspace-rabbitmq
  RABBIT_PROTOCOL: amqp
  RABBIT_HOST: docspace-rabbitmq
  RABBIT_PORT: "5672"
  RABBIT_VIRTUAL_HOST: /
  RABBIT_USER_NAME: guest
  RABBIT_PASSWORD: guest
  ROUTER_HOST: docspace-router
  LOG_LEVEL: Warning
  DEBUG_INFO: "false"
  CERTIFICATE_PATH: ""
  NODE_OPTIONS: "--max_old_space_size=4096"

x-service: &x-service-base
  user: "root:root"
  restart: always
  expose:
    - "5050"
  environment:
    <<: *x-app-env
  volumes:
    - app_data:/app/onlyoffice/data
    - log_data:/var/log/onlyoffice

services:
  docspace-mysql-server:
    image: mysql:8.3.0
    cap_add:
      - SYS_NICE
    container_name: docspace-mysql-server
    restart: always
    tty: true
    user: mysql
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: 8x2oPXm8KtnKH1He7UUQFogU
      MYSQL_DATABASE: docspace
      MYSQL_USER: onlyoffice_user
      MYSQL_PASSWORD: rYQtWAhJavWk3Ju2IGudpq1J
    command: --sql-mode=NO_ENGINE_SUBSTITUTION --max-connections=1000 --max-allowed-packet=1048576000 --group-concat-max-len=2048
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=8x2oPXm8KtnKH1He7UUQFogU"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  docspace-redis:
    image: redis:7
    container_name: docspace-redis
    restart: always
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3
      start_period: 10s
      timeout: 10s

  docspace-rabbitmq:
    image: rabbitmq:3
    container_name: docspace-rabbitmq
    restart: always
    expose:
      - "5672"
      - "80"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      retries: 3
      start_period: 30s
      timeout: 10s

  docspace-document-server:
    image: onlyoffice/documentserver:latest
    container_name: docspace-document-server
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: SKSWdY2ZrtAMLP7zmjmlBaG6Jzk4gwtmPqPmVwwH
      JWT_HEADER: AuthorizationJwt
      JWT_IN_BODY: "true"
      AMQP_URI: "amqp://guest:guest@docspace-rabbitmq:5672/"
      REDIS_SERVER_HOST: docspace-redis
      REDIS_SERVER_PORT: "6379"
    volumes:
      - app_data:/var/www/onlyoffice/Data
      - log_data:/var/log/onlyoffice
      - ds_fonts:/usr/share/fonts
    expose:
      - "80"
    stdin_open: true
    restart: always
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/info/info.json"]
      interval: 30s
      retries: 5
      start_period: 120s
      timeout: 10s

  docspace-backup-background-tasks:
    <<: *x-service-base
    image: onlyoffice/docspace-backup-background:latest
    container_name: docspace-backup-background-tasks

  docspace-backup:
    <<: *x-service-base
    image: onlyoffice/docspace-backup:latest
    container_name: docspace-backup

  docspace-clear-events:
    <<: *x-service-base
    image: onlyoffice/docspace-clear-events:latest
    container_name: docspace-clear-events

  docspace-files:
    <<: *x-service-base
    image: onlyoffice/docspace-files:latest
    container_name: docspace-files

  docspace-files-services:
    <<: *x-service-base
    image: onlyoffice/docspace-files-services:latest
    container_name: docspace-files-services

  docspace-people-server:
    <<: *x-service-base
    image: onlyoffice/docspace-people-server:latest
    container_name: docspace-people-server

  docspace-socket:
    <<: *x-service-base
    image: onlyoffice/docspace-socket:latest
    container_name: docspace-socket

  docspace-studio-notify:
    <<: *x-service-base
    image: onlyoffice/docspace-studio-notify:latest
    container_name: docspace-studio-notify

  docspace-api:
    <<: *x-service-base
    image: onlyoffice/docspace-api:latest
    container_name: docspace-api

  docspace-api-system:
    <<: *x-service-base
    image: onlyoffice/docspace-api-system:latest
    container_name: docspace-api-system

  docspace-studio:
    <<: *x-service-base
    image: onlyoffice/docspace-studio:latest
    container_name: docspace-studio

  docspace-ssoauth:
    <<: *x-service-base
    image: onlyoffice/docspace-ssoauth:latest
    container_name: docspace-ssoauth
    expose:
      - "5050"
      - "9834"

  docspace-notify:
    <<: *x-service-base
    image: onlyoffice/docspace-notify:latest
    container_name: docspace-notify

  docspace-doceditor:
    <<: *x-service-base
    image: onlyoffice/docspace-doceditor:latest
    container_name: docspace-doceditor
    expose:
      - "5013"

  docspace-login:
    <<: *x-service-base
    image: onlyoffice/docspace-login:latest
    container_name: docspace-login
    expose:
      - "5011"

  docspace-sdk:
    <<: *x-service-base
    image: onlyoffice/docspace-sdk:latest
    container_name: docspace-sdk

  docspace-management:
    <<: *x-service-base
    image: onlyoffice/docspace-management:latest
    container_name: docspace-management

  docspace-healthchecks:
    image: onlyoffice/docspace-healthchecks:latest
    container_name: docspace-healthchecks
    user: "root:root"
    restart: always
    expose:
      - "5050"
    environment:
      LOG_LEVEL: Warning
    volumes:
      - app_data:/app/onlyoffice/data

  docspace-router:
    image: onlyoffice/docspace-router:latest
    container_name: docspace-router
    user: "root:root"
    restart: always
    expose:
      - "8081"
      - "8099"
      - "8092"
    environment:
      SERVICE_BACKUP: docspace-backup:5050
      SERVICE_FILES: docspace-files:5050
      SERVICE_FILES_SERVICES: docspace-files-services:5050
      SERVICE_CLEAR_EVENTS: docspace-clear-events:5050
      SERVICE_NOTIFY: docspace-notify:5050
      SERVICE_PEOPLE_SERVER: docspace-people-server:5050
      SERVICE_SOCKET: docspace-socket:5050
      SERVICE_IDENTITY_API: docspace-identity-api:9090
      SERVICE_IDENTITY: docspace-identity-authorization:8080
      SERVICE_STUDIO_NOTIFY: docspace-studio-notify:5050
      SERVICE_API: docspace-api:5050
      SERVICE_API_SYSTEM: docspace-api-system:5050
      SERVICE_STUDIO: docspace-studio:5050
      SERVICE_AI: docspace-ai:5050
      SERVICE_AI_SERVICE: docspace-ai-service:5050
      SERVICE_SSOAUTH: docspace-ssoauth:5050
      SERVICE_DOCEDITOR: docspace-doceditor:5050
      SERVICE_MANAGEMENT: docspace-management:5050
      SERVICE_SDK: docspace-sdk:5050
      SERVICE_LOGIN: docspace-login:5050
      SERVICE_HEALTHCHECKS: docspace-healthchecks:5050
      SERVICE_TELEGRAM: docspace-telegram:5050
      WRONG_PORTAL_NAME_URL: ""
      DOCUMENT_CONTAINER_NAME: docspace-document-server
      DOCUMENT_SERVER_URL_EXTERNAL: ""
      REDIS_CONTAINER_NAME: docspace-redis
      REDIS_HOST: docspace-redis
      REDIS_PORT: "6379"
      REDIS_USER_NAME: ""
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      SERVICE_PORT: "5050"
      DASHBOARDS_CONTAINER_NAME: ""
      DASHBOARDS_USERNAME: ""
      DASHBOARDS_PASSWORD: ""
    volumes:
      - log_data:/var/log/onlyoffice

volumes:
  mysql_data:
  app_data:
  log_data:
  ds_fonts:
